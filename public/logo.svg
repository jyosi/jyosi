<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- Outer right golden crescent -->
  <path d="M 145 35 C 175 60, 180 160, 145 200" stroke="#D4A017" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Outer left golden crescent -->
  <path d="M 55 35 C 25 60, 20 160, 55 200" stroke="#D4A017" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Inner right maroon/dark red crescent -->
  <path d="M 135 55 C 160 80, 165 155, 135 190" stroke="#7B1818" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Inner left maroon/dark red crescent -->
  <path d="M 65 55 C 40 80, 35 155, 65 190" stroke="#7B1818" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- J vertical stem -->
  <rect x="88" y="60" width="24" height="110" rx="3" fill="#1B2A5C"/>
  <!-- J top ball/circle -->
  <circle cx="100" cy="48" r="16" fill="#1B2A5C"/>
  <!-- White line across the ball -->
  <rect x="86" y="45" width="28" height="4" rx="2" fill="white"/>
  <!-- Small circle on top of ball -->
  <circle cx="100" cy="35" r="5" fill="#1B2A5C"/>
  <!-- White inner of small top circle -->
  <circle cx="100" cy="35" r="2.5" fill="white"/>
  <!-- J hook curve at bottom -->
  <path d="M 88 170 Q 88 200, 68 205 Q 55 208, 52 195" stroke="#1B2A5C" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Text JYOSI -->
  <text x="100" y="228" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="24" fill="#1B2A5C" letter-spacing="1">JYOSI</text>
</svg>
